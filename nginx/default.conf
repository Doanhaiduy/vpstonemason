# BLOCK 1: Ép toàn bộ HTTP (Port 80) sang HTTPS (non-www)
server {
  listen 80;
  server_name pvstone.com.au www.pvstone.com.au;
  return 301 https://pvstone.com.au$request_uri;
}

# BLOCK 2: HTTP cho admin subdomain -> HTTPS admin
server {
  listen 80;
  server_name admin.pvstone.com.au;
  return 301 https://admin.pvstone.com.au$request_uri;
}

# BLOCK 3: HTTPS có "www" -> non-www
server {
  listen 443 ssl http2;
  server_name www.pvstone.com.au;

  # Dùng chung chứng chỉ SSL mà bạn đã tạo cho cả 2 domain
  ssl_certificate /etc/letsencrypt/live/pvstone.com.au/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pvstone.com.au/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  return 301 https://pvstone.com.au$request_uri;
}

# BLOCK 4: Server chính xử lý App của bạn (HTTPS non-www)
server {
  listen 443 ssl http2;
  server_name pvstone.com.au;

  ssl_certificate /etc/letsencrypt/live/pvstone.com.au/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pvstone.com.au/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  client_max_body_size 20m;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  location /_next/static/ {
    proxy_pass http://frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }

  location / {
    proxy_pass http://frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}


# BLOCK 5: Admin subdomain (HTTPS)

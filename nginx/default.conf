  location /_next/static/ {
    proxy_pass http://frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }

  location / {
    proxy_pass http://frontend:3000;
    proxy_http_version 1.1;

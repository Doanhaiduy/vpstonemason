version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: stone_mongodb
    command: ['mongod', '--bind_ip_all', '--wiredTigerCacheSizeGB', '0.25']
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-stone-showroom}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'mongosh --quiet --eval "db.runCommand({ ping: 1 }).ok" | grep 1 >/dev/null']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - stone_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stone_backend
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongodb:27017/stone-showroom}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/stone-showroom}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      FRONTEND_URLS: ${FRONTEND_URLS:-http://localhost:3000}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/api/showroom >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - stone_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
    container_name: stone_frontend
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - stone_net

  nginx:
    image: nginx:1.27-alpine
    container_name: stone_nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - stone_net

volumes:
  mongo_data:

networks:
  stone_net:
    driver: bridge
